<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>toggle() </title>
</head>
<body>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <h1>toggle() - uruchamianie naprzemienie ukrywanie i wyświetlanie elementu</h1>
    <button id="toggle">Przełącz akapit</button>
    <p id="akapit">Pierwszy akapit</p>
    <script>
        $( function(){
            $("#toggle").click(function() {
                $("#akapit").toggle();
            });
        });
    </script>
</body>
</html>
