<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fadeIn() - fadeOut </title>
</head>
<body>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <h1>fadeIn() - wyświetlanie (przybliżenie) elementu fadeOut() - ukrywanie elementu</h1>
    <button id="fadeIn">Wyświetl diva</button>
    <button id="fadeOut">Ukryj diva</button>
    <div style="width: 300; height: 300; background-color: red; display: none;" id="div1">Pierwszy akapit</div>
    <script>
        $(function(){
            $("#fadeIn").click(function(){
                $("#div1").fadeIn(5000);
            });
            $("#fadeOut").click(function(){
                $("#div1").fadeOut(5000);
            });
        });
    </script>
</body>
</html>
