<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> toggle </title>
</head>
<body>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <h1> slideToggle () - Wyłączenie i włączenie</h1>
    <div id="toggle">Click to slide down panel</div>
    <div id="panel">Hello World!</div>

    <script>
        $( function(){
            $('#toggle').click( function(){
                $('#panel').slideToggle();
            });
        });
    </script>
    <style>
        #panel, #toggle{
            background-color: yellow;
        }
        #panel{
            padding: 50px;
            display: none;
        }
    </style>
</body>
</html>
