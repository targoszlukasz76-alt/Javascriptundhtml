<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>attr() - czyta lub zmienia atrybut</title>
</head>
<body>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script>
        $( function($){
            $("button").click( function(){
                alert($("#w3s").attr("href"));
            });
        })
    </script>
    <p><a href="www.w3schools.com" id="w3s">w3schools.com</a></p>
    <button>Show href value</button>
</body>
</html>
