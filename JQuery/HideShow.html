<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> hide() i show()</title>
</head>
<body>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <h1>hide() - ukrywa element, show() - pokazuje element</h1>
    <button id="hide">Ukrywa akapit</button>
    <button id="show">Pokazuje akapit</button>
    <p id="akapit">Pierwszy akapit</p>
    <script>
        $( function(){
            $("#hide").click(function() {
                $("#akapit").hide()
            });

            $("#show").click( function(){
                $("#akapit").show();
            })
        });
    </script>
</body>
</html>
