<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ukrywanie wybranego elementu za pomocą MouseEnter</title>
</head>
<body>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <h1>Ukrywanie akapitów</h1>
    <p id="akapit">Pierwszy akapit</p>
    <p>Drugi akapit</p>
    <script>
        $(function(){
            $('#akapit').mouseenter( function(){
                $(this).hide();
            });
        })
    </script>
</body>
</html>
