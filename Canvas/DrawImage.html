<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Draw Image</title>
</head>
<body>
    <canvas width="400" height="400" id="canvas"></canvas>
    <script>
        const canvas = document.querySelector("#canvas");
        const ctx =canvas.getContext("2d");

        const img = new Image();
        img.onload = () => {
            ctx.drawImage(img, 0, 0);
            ctx.beginPath();
            ctx.moveTo(30, 96);
            ctx.lineTo(70, 66);
            ctx.lineTo(103, 76);
            ctx.lineTo(170, 15);
            ctx.stroke();
        };
        // Potrzbny jest obrazek żeby wyświetlić linie, linie pasuje do obrazka które też ma linie więc program działa
        img.src = "backdrop.png";
    </script>
</body>
</html>
