<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tworzenie obrazu</title>
</head>
<body>
    <canvas width="400" height="200" id="canvas"></canvas>
    <script>
        const canvas = document.querySelector("#canvas");
        const ctx =canvas.getContext("2d");

        ctx.beginPath(); //rozpoczęcie nowej ścieżki
        ctx.moveTo(20,20);
        ctx.lineTo(40,100);
        ctx.lineTo(50,40);
        ctx.lineTo(35,84);
        ctx.stroke();
    </script>
</body>
</html>
