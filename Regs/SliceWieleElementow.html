<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wyszukiwanie wielu kodów pocztowych</title>
</head>
<body>
    <h1> Wyszukiwanie wielu kodów pocztowych</h1>
    <h3> Wyrażenia regularne - kody pocztowe</h3>
    <script>
        const tekst = "34-220 Maków Podhalański , 34-200 Sucha Beskidzka, 34-210 , 34-205";
        var wzorzec = /\d{2}-\d{3}/g;
        let kody_pocztowe= tekst.match(wzorzec);
        kody_pocztowe.forEach( function(kod){
            console.log(kod);
        });
    </script>
</body>
</html>
