<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Szukanie numeru telefonu</title>
</head>
<body>
    <p> Wyszukiwanie nr telefonu </p>
    <script>
        let tekst = "tel. 656433445";
        var wzorzec = /\d{9}/;
        var pozycja = tekst.search( wzorzec );
        document.write( 'Cyfry znaleziono na pozycji: ' + pozycja);
    </script>
</body>
</html>
