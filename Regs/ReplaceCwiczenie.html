    <title>Zamiana Elementów ćwiczenie</title>
</head>
<body>
    <h1> Zamiana tekstu ćwiczenie </h1>
    <p>„Ja i ojczyzna – to jedno.”- Adam Mickiewicz"</p>
    <script>
        let text = "„Ja i ojczyzna – to jedno.”- Adam Mickiewicz";
        let resultat = text.replace(/Adam.Mickiewicz/i,"Łukasz Targosz");
        console.log(resultat);
    </script>
</body>
